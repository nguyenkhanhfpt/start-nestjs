services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    tty: true
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - database
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    tty: true
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - database
    networks:
      - app-network

  database:
    image: postgres:15
    volumes:
      - database-data:/var/lib/postgresql/data
    restart: always
    ports:
      # Map to port 5440 on host to avoid conflict with local PostgreSQL (5432)
      # Container internal port remains 5432
      - "${DATABASE_PORT_EXTERNAL:-5440}:5432"
    environment:
      POSTGRES_DB: "${DATABASE_NAME}"
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      TZ: "UTC"
    networks:
      - app-network

  # localstack:
  #   image: localstack/localstack
  #   ports:
  #     # LocalStack port (no conflict expected)
  #     - "${LOCALSTACK_PORT:-4566}:4566"
  #   environment:
  #     - SERVICES=s3
  #     - GATEWAY_LISTEN=0.0.0.0:4566
  #   volumes:
  #     - localstack-data:/var/lib/localstack # Persist data
  #     - localstack-docker-sock:/var/run/docker.sock
  #   networks:
  #     - app-network

  redis:
    image: redis/redis-stack:latest
    restart: always
    ports:
      # Map to port 6400 on host to avoid conflict with local Redis (6379)
      # Container internal port remains 6379
      - "${REDIS_PORT_EXTERNAL:-6400}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
    environment:
      REDIS_ARGS: "--requirepass redispass"
    networks:
      - app-network

volumes:
  database-data:
  # localstack-data:
  # localstack-docker-sock:
  redis_data:

networks:
  app-network:
      driver: bridge
